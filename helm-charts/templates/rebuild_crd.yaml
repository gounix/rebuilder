apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rebuilds.gounix.nl
spec:
  group: gounix.nl
  scope: Namespaced
  names:
    plural: rebuilds
    singular: rebuild
    kind: Rebuild
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              base:
                type: object
                properties:
                  host:
                    description: repo host, empty for dockerHub and ghcr, thos are fixed
                    type: string
                  type:
                    description: type of registry, when in doubt try dockerRegistry
                    type: string
                    enum:
                      - dockerHub
                      - dockerRegistry
                      - ghcr
                  image:
                    description: name of the image including namespace
                    type: string
                  tag:
                    description: tag of the image
                    type: string
                  authenticated:
                    description: authentication needed or not
                    type: boolean
                  secretName:
                    description: name of secret if authenticated = true
                    type: string
                required:
                - type
                - image
                - tag
              git:
                type: object
                properties:
                  host:
                    description: hostname of the git server
                    type: string
                  project:
                    description: name of the git project
                    type: string
                  user:
                    description: ssh user to connect to the git repo normally 'git'
                    type: string
                  dir:
                    description: subdirectory of the repo where the code can be found
                    type: string
                  secretName:
                    description: secret containing he ssh key for connecting to git
                    type: string
                  sshKeyName:
                    description: name of the ssh key that is in the secret (id_rsa or whatever name it has)
                    type: string
                required:
                - host
                - project
                - user
                - secretName
                - sshKeyName
              registry:
                type: object
                properties:
                  host:
                    description: empty for dockerHub and ghcr
                    type: string
                  type:
                    description: dockerHub for registry-1.docker.io, dockerRegistry for most others
                    type: string
                    enum:
                      - dockerHub
                      - dockerRegistry
                      - ghcr
                  image:
                    description: name of the image including namespace
                    type: string
                  tag:
                    description: tag of the image
                    type: string
                  authenticated:
                    description: authentication needed or not
                    type: boolean
                  secretName:
                    description: name of secret if authenticated = true
                    type: string
                required:
                - type
                - image
                - tag
              actions:
                items:
                  properties:
                    objecttype:
                      description: object type to be restarted
                      type: string 
                      enum:
                        - deployment
                        - daemonset
                        - statefulset
                        - replicaset
                    #namespace:
                    #  description: namespace of the object
                    #  type: string
                    name:
                      description: name of the object
                      type: string 
                  required:
                  - name
                  - objecttype
                  #- namespace
                  type: object
                type: array

    selectableFields:
    - jsonPath: .spec.git.host
    - jsonPath: .spec.registry.host
    additionalPrinterColumns:
    - jsonPath: .spec.git.host
      name: "GIT host"
      type: string
    - jsonPath: .spec.registry.host
      name: "Registry server"
      type: string
    - jsonPath: .spec.base.image
      name: "Base image"
      type: string

